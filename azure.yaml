name: ghas-defender-example
metadata:
  template: ghas-defender-example@1.0.0
infra:
  provider: bicep
  path: ./infra
  module: main
services:
  backend:
    project: ./src/backend
    language: java
    host: aks
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true
    k8s:
      deploymentPath: k8s
      namespace: app
      deployment:
        name: backend
      service:
        name: backend
      ingress:
        name: backend
        relativePath: /api
    hooks:
      predeploy:
        posix:
          shell: sh
          run: ../../scripts/azd-hooks/predeploy-backend.sh
          interactive: false
        windows:
          shell: pwsh
          run: ../../scripts/azd-hooks/predeploy-backend.ps1
          interactive: false
  frontend:
    project: ./src/frontend
    language: ts
    host: staticwebapp
    dist: dist
    hooks:
      predeploy:
        posix:
          shell: sh
          run: ../../scripts/azd-hooks/predeploy-frontend.sh
          interactive: false
        windows:
          shell: pwsh
          run: ../../scripts/azd-hooks/predeploy-frontend.ps1
          interactive: false
hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/azd-hooks/postprovision.sh
    windows:
      shell: pwsh
      run: ./scripts/azd-hooks/postprovision.ps1
