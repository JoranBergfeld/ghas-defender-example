name: ghas-defender-example
metadata:
  template: ghas-defender-example@1.0.0
infra:
  provider: bicep
  path: ./infra
  module: main
services:
  backend:
    project: ./src/backend
    language: java
    host: aks
    docker:
      path: ./Dockerfile
      context: .
      remoteBuild: true
  frontend:
    project: ./src/frontend
    language: ts
    host: staticwebapp
    dist: dist
hooks:
  postprovision:
    posix:
      shell: sh
      run: ./scripts/azd-hooks/postprovision.sh
    windows:
      shell: pwsh
      run: ./scripts/azd-hooks/postprovision.ps1
