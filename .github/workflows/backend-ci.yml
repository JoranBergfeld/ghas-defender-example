name: backend-ci

on:
  pull_request:
    branches:
      - main
      - secure
      - vulnerable
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'
  push:
    branches:
      - main
      - secure
      - vulnerable
    paths:
      - 'src/backend/**'
      - '.github/workflows/backend-ci.yml'
  workflow_dispatch:

env:
  AZURE_ENV_NAME: ghasdemo
  AZURE_LOCATION: swedencentral

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Run Maven verify
        run: ./mvnw -f src/backend/pom.xml -B verify

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-surefire-reports
          path: |
            src/backend/target/surefire-reports/**
            src/backend/target/failsafe-reports/**
          if-no-files-found: ignore

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      packages: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          config-file: ./.github/codeql-config.yml

      - name: Build backend with Maven
        run: ./mvnw -f src/backend/pom.xml -B -DskipTests package

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:java-kotlin
          output: codeql-results

      - name: Fail on high or critical CodeQL findings
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          
          threshold = 7.0
          sarif_files = list(Path('codeql-results').rglob('*.sarif'))
          if not sarif_files:
              raise SystemExit('No CodeQL SARIF files found in codeql-results')
          
          findings = []
          for sarif_file in sarif_files:
              data = json.loads(sarif_file.read_text())
              for run in data.get('runs', []):
                  rules = {
                      rule.get('id'): rule
                      for rule in run.get('tool', {}).get('driver', {}).get('rules', [])
                  }
                  for result in run.get('results', []):
                      rule_id = result.get('ruleId')
                      rule = rules.get(rule_id, {})
                      properties = rule.get('properties', {})
                      raw_score = properties.get('security-severity')
                      if raw_score is None:
                          continue
                      try:
                          score = float(raw_score)
                      except ValueError:
                          continue
                      if score >= threshold:
                          message = result.get('message', {}).get('text', 'No message')
                          findings.append(f'{rule_id}: security-severity {score} - {message}')
          
          if findings:
              print('High or critical CodeQL findings:')
              for finding in findings:
                  print(f'- {finding}')
              raise SystemExit(1)
          
          print('No high or critical CodeQL findings found.')
          PY

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4

  deploy:
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && (github.ref_name == 'secure' || github.ref_name == 'vulnerable')
    needs:
      - build-test
      - codeql
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: backend-deploy-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl and kubelogin
        shell: bash
        run: |
          sudo az aks install-cli
          kubelogin --version
          kubectl version --client

      - uses: Azure/setup-azd@v2

      - name: Authenticate azd with federated credentials
        shell: bash
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider github \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Prepare azd environment
        shell: bash
        run: |
          azd env new "${AZURE_ENV_NAME}" --no-prompt || azd env select "${AZURE_ENV_NAME}"
          azd env set AZURE_LOCATION "${AZURE_LOCATION}"
          azd env set AZURE_SUBSCRIPTION_ID "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          azd env set AZURE_TENANT_ID "${{ vars.AZURE_TENANT_ID }}"
          principal_id="$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)"
          azd env set AZURE_PRINCIPAL_ID "${principal_id}"
          azd env set AZURE_PRINCIPAL_TYPE ServicePrincipal

      - name: Override CI-only Bicep params
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          path = 'infra/main.parameters.json'
          with open(path) as fh:
              data = json.load(fh)
          data['parameters']['createGhaDeployerSubscriptionRoles'] = { 'value': False }
          data['parameters']['createGhaDeployerResourceRoles'] = { 'value': False }
          data['parameters']['createDeveloperAndOperatorRoles'] = { 'value': False }
          with open(path, 'w') as fh:
              json.dump(data, fh, indent=2)
              fh.write('\n')
          PY

      - name: Refresh azd environment outputs
        run: azd env refresh --no-prompt || true

      - name: Hydrate azd env vars from Azure resources
        shell: bash
        run: |
          RG=$(az group list --tag azd-env-name=${AZURE_ENV_NAME} --query "[0].name" -o tsv)
          if [ -z "$RG" ]; then echo "ERROR: no RG found with azd-env-name=${AZURE_ENV_NAME}"; exit 1; fi
          azd env set AZURE_RESOURCE_GROUP "$RG"
          ACR_NAME=$(az resource list -g "$RG" --resource-type Microsoft.ContainerRegistry/registries --query "[0].name" -o tsv)
          ACR_ENDPOINT=$(az acr show -n "$ACR_NAME" --query loginServer -o tsv)
          azd env set AZURE_CONTAINER_REGISTRY_NAME "$ACR_NAME"
          azd env set AZURE_CONTAINER_REGISTRY_ENDPOINT "$ACR_ENDPOINT"
          AKS_NAME=$(az resource list -g "$RG" --resource-type Microsoft.ContainerService/managedClusters --query "[0].name" -o tsv)
          azd env set AZURE_AKS_CLUSTER_NAME "$AKS_NAME"
          azd env set AZURE_AKS_NAMESPACE app
          KV_NAME=$(az resource list -g "$RG" --resource-type Microsoft.KeyVault/vaults --query "[0].name" -o tsv)
          KV_URI=$(az keyvault show -n "$KV_NAME" -g "$RG" --query properties.vaultUri -o tsv)
          azd env set AZURE_KEY_VAULT_NAME "$KV_NAME"
          azd env set AZURE_KEY_VAULT_URI "$KV_URI"
          PG_NAME=$(az resource list -g "$RG" --resource-type Microsoft.DBforPostgreSQL/flexibleServers --query "[0].name" -o tsv)
          PG_HOST=$(az postgres flexible-server show -n "$PG_NAME" -g "$RG" --query fullyQualifiedDomainName -o tsv)
          azd env set AZURE_POSTGRES_HOST "$PG_HOST"
          azd env set AZURE_POSTGRES_DATABASE appdb
          BE_MI_CLIENT_ID=$(az identity show -n id-backend -g "$RG" --query clientId -o tsv)
          azd env set AZURE_BACKEND_IDENTITY_CLIENT_ID "$BE_MI_CLIENT_ID"
          GHA_MI_CLIENT_ID=$(az identity show -n id-gha-deployer -g "$RG" --query clientId -o tsv)
          azd env set AZURE_GHA_DEPLOYER_CLIENT_ID "$GHA_MI_CLIENT_ID"
          SWA_NAME=$(az resource list -g "$RG" --resource-type Microsoft.Web/staticSites --query "[0].name" -o tsv)
          SWA_HOST=$(az staticwebapp show -n "$SWA_NAME" -g "$RG" --query defaultHostname -o tsv)
          azd env set AZURE_STATIC_WEB_APP_NAME "$SWA_NAME"
          azd env set AZURE_STATIC_WEB_APP_HOSTNAME "$SWA_HOST"

      - name: Deploy backend
        continue-on-error: false
        run: azd deploy backend --no-prompt