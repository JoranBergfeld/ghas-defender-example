name: infra

on:
  pull_request:
    branches:
      - main
      - secure
      - vulnerable
    paths:
      - 'infra/**'
      - 'azure.yaml'
  push:
    branches:
      - main
      - secure
      - vulnerable
    paths:
      - 'infra/**'
      - 'azure.yaml'
  workflow_dispatch:

env:
  AZURE_ENV_NAME: ghasdemo
  AZURE_LOCATION: swedencentral

jobs:
  what-if:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Export azd-compatible principal ID
        shell: bash
        run: |
          principal_id="$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)"
          echo "AZURE_PRINCIPAL_ID=${principal_id}" >> "${GITHUB_ENV}"
          echo "AZURE_PRINCIPAL_TYPE=ServicePrincipal" >> "${GITHUB_ENV}"

      - name: Build Bicep
        run: az bicep build --file infra/main.bicep

      - name: Run subscription what-if
        shell: bash
        env:
          GITHUB_ORG: ${{ github.repository_owner }}
          GITHUB_REPO: ${{ github.event.repository.name }}
        run: |
          set -o pipefail
          envsubst < infra/main.parameters.json > main.parameters.expanded.json
          az deployment sub what-if \
            --location "${AZURE_LOCATION}" \
            --template-file infra/main.bicep \
            --parameters @main.parameters.expanded.json \
            --parameters environmentName="${AZURE_ENV_NAME}" \
            2>&1 | tee what-if.txt

      - name: Prepare what-if PR comment
        shell: bash
        run: |
          {
            echo '## Azure what-if'
            echo
            echo '```text'
            python3 - <<'PY'
          from pathlib import Path
          text = Path('what-if.txt').read_text(errors='replace')
          limit = 60_000
          if len(text) > limit:
              text = text[:limit] + '\n... truncated to 60KB ...\n'
          print(text)
          PY
            echo '```'
          } > what-if-comment.md

      - uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: infra-what-if
          path: what-if-comment.md

  codeql-iac:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: actions
          config-file: ./.github/codeql-config.yml

      - uses: github/codeql-action/analyze@v3
        with:
          category: /language:actions
          upload: true

  provision:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: infra-provision-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - uses: Azure/setup-azd@v2

      - name: Authenticate azd with federated credentials
        shell: bash
        run: |
          azd auth login \
            --client-id "${{ vars.AZURE_CLIENT_ID }}" \
            --federated-credential-provider github \
            --tenant-id "${{ vars.AZURE_TENANT_ID }}"

      - name: Prepare azd environment
        shell: bash
        run: |
          azd env new "${AZURE_ENV_NAME}" --no-prompt || azd env select "${AZURE_ENV_NAME}"
          azd env set AZURE_LOCATION "${AZURE_LOCATION}"
          azd env set AZURE_SUBSCRIPTION_ID "${{ vars.AZURE_SUBSCRIPTION_ID }}"
          azd env set AZURE_TENANT_ID "${{ vars.AZURE_TENANT_ID }}"
          principal_id="$(az ad sp show --id "${{ vars.AZURE_CLIENT_ID }}" --query id -o tsv)"
          azd env set AZURE_PRINCIPAL_ID "${principal_id}"
          azd env set AZURE_PRINCIPAL_TYPE ServicePrincipal

      - name: Provision Azure resources
        run: azd provision --no-prompt
